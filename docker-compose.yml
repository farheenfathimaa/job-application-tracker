services:
  db:
    image: postgres:15-alpine
    container_name: jobapp-db
    environment:
      POSTGRES_DB: jobtracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jobapp-network

  backend:
    build: ./backend
    container_name: jobapp-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=jobtracker
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      - db
    networks:
      - jobapp-network

  frontend:
    build: ./frontend
    container_name: jobapp-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - jobapp-network

networks:
  jobapp-network:
    driver: bridge

volumes:
  postgres_data:
